version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.1-alpine
    container_name: stock-clickhouse
    ports:
      - "18123:8123"  # HTTP接口
      - "19000:9000"  # Native接口
    environment:
      CLICKHOUSE_DB: stock_db
      CLICKHOUSE_USER: stock_user
      CLICKHOUSE_PASSWORD: stock_pass
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse_config:/etc/clickhouse-server/config.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock-network

volumes:
  clickhouse_data:
    driver: local

networks:
  stock-network:
    driver: bridge
